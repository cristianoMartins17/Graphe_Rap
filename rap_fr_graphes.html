<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rap FR — Graphe des featurings</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #1f1f1f;
      --accent:    #c8f135;   /* vert acide — rappelle l'encre sur flyer rap */
      --accent2:   #ff3c3c;   /* rouge pour top collabs */
      --text:      #e8e8e8;
      --muted:     #555;
      --font-title: 'Bebas Neue', sans-serif;
      --font-body:  'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      padding: 2.5rem 3rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 2rem;
    }
    header h1 {
      font-family: var(--font-title);
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.5;
      padding-bottom: 0.25rem;
    }

    /* ── TABS ── */
    nav.tabs {
      display: flex;
      gap: 0;
      padding: 0 3rem;
      border-bottom: 1px solid var(--border);
    }
    nav.tabs button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-title);
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      padding: 0.9rem 2rem 0.7rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    nav.tabs button:hover { color: var(--text); }
    nav.tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── LAYOUT ── */
    .view { display: none; }
    .view.active { display: flex; gap: 0; height: calc(100vh - 130px); }

    /* ── CANVAS ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 50%, #141414 0%, #0a0a0a 100%);
    }
    svg.graph {
      width: 100%;
      height: 100%;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem;
    }
    .stat-box .label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .stat-box .value {
      font-family: var(--font-title);
      font-size: 2rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-box .sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .section-title {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* Légende cliques */
    .clique-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }
    .clique-item:hover { background: #161616; }
    .clique-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .clique-label {
      font-size: 0.65rem;
      line-height: 1.4;
      color: var(--text);
    }
    .clique-label strong {
      display: block;
      font-size: 0.7rem;
      color: var(--accent);
    }

    /* Légende arêtes */
    .edge-legend { display: flex; flex-direction: column; gap: 0.5rem; }
    .edge-legend-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.65rem; color: var(--muted); }
    .edge-line { height: 2px; width: 28px; flex-shrink: 0; }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #1a1a1a;
      border: 1px solid var(--accent);
      padding: 0.6rem 0.9rem;
      font-size: 0.7rem;
      line-height: 1.6;
      max-width: 220px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #tooltip.show { opacity: 1; }
    #tooltip strong { color: var(--accent); display: block; margin-bottom: 0.2rem; }

    /* Nœuds et arêtes SVG */
    .node circle {
      stroke: #0a0a0a;
      stroke-width: 1.5px;
      transition: r 0.15s, opacity 0.2s;
    }
    .node text {
      font-family: var(--font-body);
      font-size: 9px;
      fill: #ccc;
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .node:hover circle { stroke: var(--accent); stroke-width: 2.5px; }

    line.edge {
      transition: opacity 0.2s;
    }

    /* Zoom hint */
    .zoom-hint {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.6rem;
      color: var(--muted);
      pointer-events: none;
    }


    /* ── DIJKSTRA ── */
    .dijkstra-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-title);
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dijkstra-btn:hover {
      background: var(--accent);
      color: #0a0a0a;
    }
    .dijkstra-btn.running {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .dijkstra-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid #a855f7;
      padding: 0.9rem;
      font-size: 0.65rem;
      line-height: 1.7;
      display: none;
    }
    .dijkstra-result.show { display: block; }
    .dijkstra-result .dij-title {
      font-family: var(--font-title);
      font-size: 1rem;
      color: #a855f7;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .dijkstra-result .dij-endpoints {
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
    }
    .dijkstra-result .dij-path {
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .dijkstra-result .dij-path span {
      color: var(--text);
    }
    .dijkstra-reset {
      font-size: 0.6rem;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      margin-top: 0.4rem;
      display: inline-block;
    }
    .dijkstra-reset:hover { color: var(--text); }

    @keyframes pathPulse {
      0%, 100% { stroke-opacity: 0.9; }
      50%       { stroke-opacity: 0.3; }
    }
    line.dijkstra-path {
      animation: pathPulse 1.4s ease-in-out infinite;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .node { animation: fadeIn 0.4s ease both; }
  </style>
</head>

<header>
  <h1>RAP FR<br>FEATURINGS</h1>
  <p>Cartographie des collaborations du rap francophone.<br>
     Nœuds colorés par clique · Épaisseur = nombre de feats · Cliquez pour explorer.</p>
</header>

<nav class="tabs">
  <button class="active" onclick="switchTab('graph', this)">GRAPHE PRINCIPAL</button>

const tooltip = document.getElementById('tooltip');
function showTip(html, e) {
  tooltip.innerHTML = html;
  tooltip.classList.add('show');

function moveTip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTip() { tooltip.classList.remove('show'); }

}


// ═══════════════════════════════════════
//  DIJKSTRA (non pondéré — BFS suffit,
//  mais on implémente Dijkstra avec poids=1
//  pour coller à la demande)
// ═══════════════════════════════════════

function buildAdjacency(nodes, edges) {
  // Construit la liste d'adjacence {id: [{neighbor, weight}]}
  const adj = {};
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => {
    adj[e.source].push({ neighbor: e.target,  w: 1 });
    adj[e.target].push({ neighbor: e.source,  w: 1 });
  });
  return adj;
}

function dijkstra(adj, source) {
  // Dijkstra classique avec file de priorité (min-heap simulée)
  // Retourne {dist: {id: distance}, prev: {id: predecessor}}
  const dist = {}, prev = {};
  const visited = new Set();

  Object.keys(adj).forEach(id => { dist[id] = Infinity; prev[id] = null; });
  dist[source] = 0;

  // File simple (pour ~30 nœuds, O(n²) est largement suffisant)
  while (true) {
    // Trouver le nœud non visité avec dist minimale
    let u = null;
    Object.keys(dist).forEach(id => {
      if (!visited.has(id) && (u === null || dist[id] < dist[u])) u = id;
    });
    if (u === null || dist[u] === Infinity) break;
    visited.add(u);

    adj[u].forEach(({ neighbor, w }) => {
      const alt = dist[u] + w;
      if (alt < dist[neighbor]) {
        dist[neighbor] = alt;
        prev[neighbor] = u;
      }
    });
  }
  return { dist, prev };
}

function reconstructPath(prev, source, target) {
  const path = [];
  let cur = target;
  while (cur !== null) {
    path.unshift(cur);
    cur = prev[cur];
  }
  return path[0] === source ? path : null; // null si pas de chemin
}

function findDiameter(nodes, edges) {
  // Cherche la paire (source, cible) maximisant la distance shortest-path
  const adj = buildAdjacency(nodes, edges);
  let maxDist = -1, bestSrc = null, bestTgt = null, bestPath = null;

  nodes.forEach(n => {
    const { dist, prev } = dijkstra(adj, n.id);
    Object.keys(dist).forEach(tgt => {
      if (tgt !== n.id && dist[tgt] !== Infinity && dist[tgt] > maxDist) {
        maxDist  = dist[tgt];
        bestSrc  = n.id;
        bestTgt  = tgt;
        bestPath = reconstructPath(prev, n.id, tgt);
      }
    });
  });
  return { src: bestSrc, tgt: bestTgt, dist: maxDist, path: bestPath };
}

// ── Affichage du chemin sur le SVG ──
let _dijkstraActive = false;

function showDiametre() {
  if (_dijkstraActive) return;
  _dijkstraActive = true;

  const btn = document.getElementById('btn-dijkstra');
  btn.classList.add('running');
  btn.textContent = '⏳ Calcul en cours…';

  // Petit délai pour laisser le navigateur afficher le message
  setTimeout(() => {
    const { src, tgt, dist, path } = findDiameter(GRAPH.nodes, GRAPH.edges);

    // Effacer les arêtes normales et mettre en gris
    d3.selectAll('#svg-graph line:not(.dijkstra-path)')
      .attr('stroke-opacity', 0.08);

    // Effacer nœuds
    d3.selectAll('#svg-graph circle')
      .attr('opacity', 0.15);

    // Construire un set des arêtes du chemin
    const pathEdges = new Set();
    for (let i = 0; i < path.length - 1; i++) {
      pathEdges.add(path[i] + '||' + path[i+1]);
      pathEdges.add(path[i+1] + '||' + path[i]);
    }

    // Mettre en valeur les arêtes du chemin
    d3.selectAll('#svg-graph line')
      .filter(d => pathEdges.has(d.source + '||' + d.target))
      .classed('dijkstra-path', true)
      .attr('stroke', '#a855f7')
      .attr('stroke-width', 0.018)
      .attr('stroke-opacity', 0.9);

    // Mettre en valeur les nœuds du chemin
    d3.selectAll('#svg-graph g')
      .filter(d => d && path.includes(d.id))
      .select('circle')
        .attr('opacity', 1)
        .attr('stroke', d => d.id === src || d.id === tgt ? '#a855f7' : '#c8f135')
        .attr('stroke-width', d => d.id === src || d.id === tgt ? 0.022 : 0.014)
        .attr('r', d => d.id === src || d.id === tgt ? 0.08 : 0.065);

    // Afficher le résultat dans la sidebar
    const resultBox = document.getElementById('dijkstra-result');
    resultBox.classList.add('show');
    resultBox.innerHTML = `
      <div class="dij-title">⬡ DIAMÈTRE DU GRAPHE</div>
      <div class="dij-endpoints">${src} ↔ ${tgt}</div>
      <div style="color:var(--muted);margin-top:.3rem">Distance : <span style="color:var(--accent);font-size:.85rem">${dist} sauts</span></div>
      <div class="dij-path">Chemin :<br>
        <span>${path.join(' → ')}</span>
      </div>
      <div class="dijkstra-reset" onclick="resetDijkstra()">✕ Effacer</div>
    `;

    btn.textContent = '✓ Diamètre affiché';
    btn.style.borderColor = '#a855f7';
    btn.style.color = '#a855f7';
  }, 60);
}

function resetDijkstra() {
  _dijkstraActive = false;

  // Rétablir les arêtes
  d3.selectAll('#svg-graph line')
    .classed('dijkstra-path', false)
    .attr('stroke', d => d.is_top ? '#ff3c3c' : d.is_pont ? '#c8f135' : '#444')
    .attr('stroke-width', d => 0.004 + d.weight * 0.003)
    .attr('stroke-opacity', d => d.is_top ? 0.95 : d.is_pont ? 0.75 : 0.5);

  // Rétablir les nœuds
  d3.selectAll('#svg-graph circle')
    .attr('opacity', 1)
    .attr('stroke', '#0a0a0a')
    .attr('stroke-width', 0.006)
    .attr('r', 0.055);

  // Reset bouton
  const btn = document.getElementById('btn-dijkstra');
  btn.classList.remove('running');
  btn.textContent = '▶ AFFICHER LE DIAMÈTRE';
  btn.style.borderColor = '';
  btn.style.color = '';

  document.getElementById('dijkstra-result').classList.remove('show');
}

    .scaleExtent([0.5, 8])

  // Index nœuds
  const nodeMap = {};

  // ── Arêtes ──
  g.append('g').selectAll('line')
    .data(GRAPH.edges)
    .join('line')
      .attr('x1', d => nodeMap[d.source].x)
      .attr('y1', d => nodeMap[d.source].y)
      .attr('x2', d => nodeMap[d.target].x)
      .attr('y2', d => nodeMap[d.target].y)
      .attr('stroke',         d => d.is_top ? '#ff3c3c' : d.is_pont ? '#c8f135' : '#444')

        d3.select(this).attr('stroke-opacity', 1).attr('stroke-width', 0.012);

          ${d.is_pont?'<br><span style="color:#c8f135">🔗 Pont inter-cliques</span>':''}`, event);
      })
      .on('mousemove', moveTip)
      .on('mouseout', function(event, d) {
        hideTip();
        d3.select(this)
          .attr('stroke-opacity', d.is_top ? 0.95 : d.is_pont ? 0.75 : 0.5)
          .attr('stroke-width', 0.004 + d.weight * 0.003);

  // ── Nœuds ──
  const R = 0.055;
  const nodeG = g.append('g').selectAll('g')
    .data(GRAPH.nodes)

    .attr('r', R)
    .attr('fill', d => d.color)
    .attr('stroke', '#0a0a0a')
    .attr('stroke-width', 0.006);

  nodeG.append('text')
    .text(d => d.id.split(' ')[0])
    .attr('y', R + 0.055)
    .attr('text-anchor', 'middle')
    .attr('fill', '#aaa')
    .attr('font-size', '0.055px')
    .attr('font-family', 'DM Mono, monospace');

  nodeG
    .on('mouseover', function(event, d) {
      d3.select(this).select('circle').attr('r', R * 1.4).attr('stroke', '#c8f135');
      const collabs = GRAPH.edges
        .filter(e => e.source === d.id || e.target === d.id)
        .sort((a,b) => b.weight - a.weight).slice(0,5)
        .map(e => `${e.source===d.id?e.target:e.source} (${e.weight})`).join('<br>');
      const cInfo = d.clique
        ? `<span style="color:${d.color}">● Clique C${d.clique}</span>`
        : `<span style="color:#87ceeb">● Hors clique</span>`;
      showTip(`<strong>${d.id}</strong>${cInfo}<br><br>Collabs :<br>${collabs}`, event);
    })
    .on('mousemove', moveTip)
    .on('mouseout', function() {
      hideTip();
      d3.select(this).select('circle').attr('r', R).attr('stroke', '#0a0a0a');
    });

  // ── Sidebar ──
  const deg = n => GRAPH.edges.filter(e => e.source===n.id||e.target===n.id).length;
  const topEdge = GRAPH.edges.find(e => e.is_top);
  document.getElementById('sidebar-graph').innerHTML = `

    <button class="dijkstra-btn" id="btn-dijkstra" onclick="showDiametre()">
      ▶ AFFICHER LE DIAMÈTRE
    </button>
    <div class="dijkstra-result" id="dijkstra-result"></div>
    <div class="section-title">STATISTIQUES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <div class="stat-box"><div class="label">Artistes</div><div class="value">${GRAPH.nodes.length}</div></div>
      <div class="stat-box"><div class="label">Featurings</div><div class="value">${GRAPH.edges.length}</div></div>
      <div class="stat-box"><div class="label">Max feats</div><div class="value">${GRAPH.poids_max}</div>
        <div class="sub">${topEdge.source} × ${topEdge.target}</div></div>
      <div class="stat-box"><div class="label">Cliques</div><div class="value">${GRAPH.cliques.length}</div><div class="sub">taille ≥ 3</div></div>
    </div>
    <div class="section-title" style="margin-top:.5rem">TOP ARTISTES</div>
    ${[...GRAPH.nodes].sort((a,b)=>deg(b)-deg(a)).slice(0,8).map((n,i)=>`
      <div style="display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid #1a1a1a;font-size:.68rem">
        <span style="color:${i<3?'var(--accent)':'var(--muted)'};width:18px">${i+1}</span>
        <span style="flex:1">${n.id}</span>

        <div class="clique-label"><strong>C${c.id} — ${c.taille} artistes</strong>${c.artistes.join(', ')}</div>
      </div>`).join('')}`;
}

function highlightClique(id) {
  d3.selectAll('#svg-graph circle')
    .attr('opacity', d => d.clique === id ? 1 : 0.1);
  d3.selectAll('#svg-graph line')
    .attr('stroke-opacity', d => {
      const s = GRAPH.nodes.find(n=>n.id===d.source);
      const t = GRAPH.nodes.find(n=>n.id===d.target);
      return (s?.clique===id||t?.clique===id) ? 0.9 : 0.04;
    });
  setTimeout(() => {
    d3.selectAll('#svg-graph circle').attr('opacity', 1);
    d3.selectAll('#svg-graph line').attr('stroke-opacity', d =>
      d.is_top ? 0.95 : d.is_pont ? 0.75 : 0.5);
  }, 2500);
}

  const nodeG = g.append('g').selectAll('g')
    .data(META.nodes)
    .join('g')
      .attr('transform', d => `translate(${d.x},${d.y})`);

  nodeG.append('circle')
    .attr('r', d => rScale(d.taille))
    .attr('fill', '#2e8b57')
    .attr('stroke', '#0a0a0a')
    .attr('stroke-width', 0.008);

  nodeG.append('text')
    .text(d => d.id)
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('fill', 'white')
    .attr('font-size', '0.065px')
    .attr('font-weight', 'bold')
    .attr('font-family', 'DM Mono, monospace');

  nodeG.append('text')
    .text(d => `${d.taille} artistes`)
    .attr('y', d => rScale(d.taille) + 0.055)
    .attr('text-anchor', 'middle')
    .attr('fill', '#777')
    .attr('font-size', '0.045px')
    .attr('font-family', 'DM Mono, monospace');

  nodeG
    .on('mouseover', function(event, d) {
      d3.select(this).select('circle').attr('stroke','#c8f135').attr('stroke-width',0.012);
      showTip(`<strong>${d.id}</strong>${d.taille} artistes<br><br>${d.artistes.join('<br>')}`, event);
    })
    .on('mousemove', moveTip)
    .on('mouseout', function() {
      hideTip();
      d3.select(this).select('circle').attr('stroke','#0a0a0a').attr('stroke-width',0.008);
    });

  // Sidebar
  document.getElementById('sidebar-meta').innerHTML = `
    <div class="section-title">STATISTIQUES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <div class="stat-box"><div class="label">Cliques</div><div class="value">${META.nodes.length}</div><div class="sub">méta-nœuds</div></div>
      <div class="stat-box"><div class="label">Ponts</div><div class="value">${META.edges.length}</div><div class="sub">inter-cliques</div></div>
    </div>
    <div class="section-title" style="margin-top:.5rem">CLIQUES PAR TAILLE</div>
    ${[...META.nodes].sort((a,b)=>b.taille-a.taille).map(n => {
      const ponts = META.edges.filter(e=>e.source===n.id||e.target===n.id).length;
      return `<div class="clique-item" style="cursor:default">
        <div class="clique-dot" style="background:#2e8b57;width:${6+n.taille*3}px;height:${6+n.taille*3}px"></div>
        <div class="clique-label"><strong>${n.id} — ${n.taille} artistes · ${ponts} pont${ponts>1?'s':''}</strong>${n.artistes.join(', ')}</div>
      </div>`;
    }).join('')}
    <div class="section-title" style="margin-top:.5rem">LÉGENDE</div>
    <div class="edge-legend">
      <div class="edge-legend-item"><div style="width:22px;height:22px;border-radius:50%;background:#2e8b57;flex-shrink:0"></div>Clique (taille ∝ rayon)</div>
      <div class="edge-legend-item"><div class="edge-line" style="background:#ff3c3c;height:3px"></div>Pont inter-clique</div>
    </div>`;
}

// ═══════════════════════════════════════
//  INIT — graphe principal au chargement
// ═══════════════════════════════════════
window.addEventListener('load', () => {
  _rendered.graph = true;
  drawGraph();
});
</script>
</body>
</html>
